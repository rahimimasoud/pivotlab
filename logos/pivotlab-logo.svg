<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="148 75 385 310" width="385" height="310" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">PivotLab</title>
  <desc id="logo-desc">PivotLab logo: a triangular prism with dashed depth lines and the PivotLab wordmark.</desc>

  <!-- Dashed back-face triangle (hidden edges for 3D depth) -->
  <!-- Top edge (back) -->
  <path d="M 250 95 L 345 95" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <path d="M 405 95 L 500 95" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- Left back edge -->
  <path d="M 250 95 L 283 160" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <path d="M 320 233 L 370 330" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- Right back edge -->
  <path d="M 500 95 L 467 160" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <path d="M 430 233 L 380 330" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- Connecting depth lines from back vertices to front vertices -->
  <line x1="250" y1="95" x2="215" y2="130" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <line x1="500" y1="95" x2="465" y2="130" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <line x1="375" y1="330" x2="340" y2="365" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- FRONT FACE: solid lines -->
  <!-- Top edge with open gap in centre -->
  <path d="M 215 130 L 310 130" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 370 130 L 465 130" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>

  <!-- Left edge with open gap -->
  <path d="M 215 130 L 248 195" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 285 268 L 340 365" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>

  <!-- Right edge with open gap -->
  <path d="M 465 130 L 432 195" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 395 268 L 340 365" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>

  <!-- Wordmark -->
  <text x="340" y="252" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="74" font-weight="500" fill="#000000" letter-spacing="2">PivotLab</text>

</svg>
