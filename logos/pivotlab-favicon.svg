  <path d="M 405 95 L 500 95" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
  <path d="M 250 95 L 283 160" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="square" stroke-dasharray="6 6" opacity="0.55"/>
