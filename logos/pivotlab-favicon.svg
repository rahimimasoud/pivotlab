  <path d="M 370 130 L 465 130" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 215 130 L 248 195" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 285 268 L 340 365" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 465 130 L 432 195" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
  <path d="M 395 268 L 340 365" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square"/>
</svg>
